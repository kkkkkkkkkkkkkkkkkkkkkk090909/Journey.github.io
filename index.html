<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Journey</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
/* ── Apple-Style Glassmorphism & Tokens ───────────────────────────────── */
:root {
  /* Default Apple Dark */
  --bg-color: #000000;
  --glass-bg: rgba(28, 28, 30, 0.65);
  --glass-border: rgba(255, 255, 255, 0.1);
  --glass-border-strong: rgba(255, 255, 255, 0.2);
  --text-main: #FFFFFF;
  --text-muted: rgba(255, 255, 255, 0.55);
  --accent: #0A84FF;
  --accent-soft: rgba(10, 132, 255, 0.15);
  --ok: #32D74B;
  --danger: #FF453A;
  --warn: #FF9F0A;
}

[data-theme="apple-light"] {
  --bg-color: #F2F2F7;
  --glass-bg: rgba(255, 255, 255, 0.7);
  --glass-border: rgba(0, 0, 0, 0.08);
  --glass-border-strong: rgba(0, 0, 0, 0.15);
  --text-main: #1C1C1E;
  --text-muted: rgba(60, 60, 67, 0.6);
  --accent: #007AFF;
  --accent-soft: rgba(0, 122, 255, 0.15);
  --ok: #34C759;
  --danger: #FF3B30;
  --warn: #FF9500;
}

[data-theme="midnight-glass"] {
  --bg-color: #0b0f19;
  --glass-bg: rgba(20, 25, 40, 0.65);
  --glass-border: rgba(255, 255, 255, 0.08);
  --accent: #8b5cf6;
  --accent-soft: rgba(139, 92, 246, 0.15);
}

[data-theme="crimson-glass"] {
  --bg-color: #1a080a;
  --glass-bg: rgba(40, 15, 20, 0.65);
  --glass-border: rgba(255, 255, 255, 0.08);
  --accent: #f43f5e;
  --accent-soft: rgba(244, 63, 94, 0.15);
}

[data-theme="ocean-glass"] {
  --bg-color: #04141c;
  --glass-bg: rgba(10, 30, 45, 0.65);
  --glass-border: rgba(255, 255, 255, 0.08);
  --accent: #0ea5e9;
  --accent-soft: rgba(14, 165, 233, 0.15);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%;width:100%;overflow:hidden}
body{
  background: var(--bg-color);
  color: var(--text-main);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  transition: background 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), color 0.6s ease;
  font-weight: 400;
}
#root{display:flex;flex-direction:column}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}

/* ── Animations ──────────────────────────────────────── */
@keyframes slideUp {
  0% { opacity: 0; transform: translateY(15px) scale(0.98); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── Header & Nav ──────────────────────────────────────── */
.hdr{
  background: var(--glass-bg);
  backdrop-filter: blur(30px) saturate(150%);
  -webkit-backdrop-filter: blur(30px) saturate(150%);
  border-bottom: 1px solid var(--glass-border);
  padding: 12px 18px 10px;
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  z-index: 10;
}
.hdr-t{
  font-size: 1.1rem; color: var(--text-main);
  font-weight: 700; letter-spacing: -0.02em;
}
.hdr-r{display:flex;align-items:center;gap:10px}
.chips{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
.chip{
  background: var(--accent-soft);
  border: 1px solid rgba(0,0,0,0.05);
  border-radius: 12px; padding: 3px 9px;
  font-size: .65rem; color: var(--accent); font-weight: 600;
  white-space: nowrap; letter-spacing: .02em;
}

.bg-picker{
  display:flex;gap:8px;padding:12px 18px;flex-shrink:0;
  border-bottom:1px solid var(--glass-border);
  background: rgba(0,0,0,0.02);
  overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;
}
.bg-picker::-webkit-scrollbar{display:none}
.bg-btn{
  flex:0 0 auto; height: 32px; border-radius: 16px;
  border: 1px solid var(--glass-border); background: var(--glass-bg);
  cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0 14px;
  transition: all 0.3s ease; color: var(--text-muted); font-size: 0.75rem; font-weight: 500;
}
.bg-btn.active{ border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }

.bnav{
  display:flex; justify-content: flex-start; gap: 8px;
  background: var(--glass-bg);
  backdrop-filter: blur(30px) saturate(150%);
  -webkit-backdrop-filter: blur(30px) saturate(150%);
  border-top: 1px solid var(--glass-border);
  flex-shrink: 0; padding: 10px 14px 20px;
  overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch;
}
.bnav::-webkit-scrollbar { display: none; }
.nbtn{
  flex: 0 0 auto; display:flex;flex-direction:column;
  align-items:center;gap:4px;padding:6px; min-width: 56px;
  background:none;border:none;cursor:pointer;
  color: var(--text-muted); font-family: inherit;
  font-size:.65rem; font-weight:500;
  transition: all 0.3s ease;
}
.nbtn:active { transform: scale(0.9); }
.nbtn.on{ color: var(--accent); font-weight: 600; }
.nico{font-size:1.25rem;line-height:1; transition: transform 0.3s ease;}
.nbtn.on .nico{ transform: translateY(-2px); }

/* ── Main & Cards ──────────────────────────────────────── */
.main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column; padding-bottom: 20px;}
.sec{padding: 16px; animation: slideUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) both;}

.card{
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  backdrop-filter: blur(30px) saturate(150%);
  -webkit-backdrop-filter: blur(30px) saturate(150%);
  padding: 18px; margin-bottom: 14px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.04);
  transition: transform 0.2s ease;
}

.ctitle{
  font-size: 1rem; color: var(--text-main);
  font-weight: 700; margin-bottom: 14px;
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
  letter-spacing: -0.01em;
}

/* ── Inputs & Buttons ──────────────────────────────────────── */
.row{display:flex;gap:10px;margin-top:12px}
.inp{
  flex:1; width: 100%;
  background: rgba(120,120,120,0.1);
  border: 1px solid var(--glass-border);
  border-radius: 12px; padding: 12px 14px;
  color: var(--text-main); font-family: inherit;
  font-size: 16px; outline: none; transition: all 0.3s ease;
}
.inp:focus{border-color: var(--accent); background: rgba(120,120,120,0.15); box-shadow: 0 0 0 3px var(--accent-soft);}
.inp::placeholder{color: var(--text-muted);}
.inp-sm{padding: 10px 12px; font-size: 15px;}
textarea.inp{resize:vertical;min-height:80px;line-height:1.5}
select.inp { appearance: none; background-color: rgba(120,120,120,0.1); }
select.inp option { background: var(--bg-color); color: var(--text-main); }

.btn{
  background: var(--accent); color: #fff; border: none;
  border-radius: 12px; padding: 12px 18px;
  font-family: inherit; font-weight: 600;
  font-size: .9rem; cursor: pointer; transition: all 0.2s ease; flex-shrink: 0;
}
.btn:active{ transform: scale(0.96); opacity: 0.9; }
.btng{background: rgba(120,120,120,0.15); color: var(--text-main); border: 1px solid var(--glass-border);}
.btnsm{padding: 8px 14px; font-size: .8rem;}
.btnfull{width:100%; display: block; text-align: center;}

/* AI Styling */
.btn-ai {
  background: linear-gradient(135deg, #8b5cf6, #d946ef);
  color: #fff;
  border: none;
}
.btn-ai:hover { opacity: 0.9; }
.ai-loading { animation: pulse 1s infinite; opacity: 0.7; pointer-events: none; }
.ai-error { font-size: 0.75rem; color: var(--danger); margin-top: 6px; }

/* ── Progress & Badges ──────────────────────────────────────── */
.pwrap{background: rgba(120,120,120,0.15); border-radius: 99px; height: 6px; overflow: hidden; margin: 8px 0;}
.pbar{height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);}
.plbl{font-size: .75rem; color: var(--text-muted); display: flex; justify-content: space-between; font-weight: 500;}

/* ── Todo/Goal/Affirm Items ──────────────────────────────────────── */
.titem, .gitem, .aitem {display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--glass-border);animation:slideUp .3s ease both;}
.aitem { align-items: center; }
.titem:last-child, .gitem:last-child, .aitem:last-child {border-bottom:none}
.tchk{width:22px;height:22px;border-radius:50%;border:2px solid var(--glass-border-strong);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;transition:all .2s cubic-bezier(0.2, 0.8, 0.2, 1);}
.tchk.on{background:var(--accent);border-color:var(--accent);}
.ttxt, .atxt{flex:1;font-size:.95rem;line-height:1.4;cursor:pointer; font-weight: 500;}
.ttxt.done{text-decoration:line-through;color:var(--text-muted); font-weight: 400;}
.tdel{background:var(--glass-bg);border:1px solid var(--glass-border);color:var(--text-muted);border-radius:50%;width:26px;height:26px;cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.tdel:active{transform:scale(0.9); background: var(--danger); color: #fff; border-color: var(--danger);}

/* ── Tabs (Sub-nav) ──────────────────────────────────────── */
.stabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.stab{
  background: var(--glass-bg); border: 1px solid var(--glass-border);
  border-radius: 16px; padding: 6px 14px; font-size: .8rem; cursor: pointer;
  color: var(--text-muted); font-family: inherit; font-weight: 500;
  transition: all 0.2s ease;
}
.stab.on{background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600;}

/* ── Date nav ─────────────────────────────────────── */
.dnav{display:flex;align-items:center;gap:12px}
.dnbtn{
  background: rgba(120,120,120,0.15); border: none; border-radius: 10px;
  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  color: var(--text-main); cursor: pointer; font-size: 1.1rem;
  transition: all 0.2s ease;
}
.dnbtn:active{ transform: scale(0.9); }
.dlbl{font-size: 1rem; font-weight: 600; color: var(--text-main); flex: 1; text-align: center;}

/* ── Misc Classes ──────────────────────────────────────── */
.flbl{font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin-bottom:6px;font-weight:600;display:block}
.frow{margin-bottom:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.empty{text-align:center;padding:30px 14px;color:var(--text-muted)}
.eico{font-size:2rem;margin-bottom:10px}.etxt{font-size:.9rem; font-weight: 500;}
.gquote{font-style:italic;color:var(--text-muted);font-size:.95rem;text-align:center;padding:14px;border-left:3px solid var(--accent);margin-bottom:14px;background:rgba(120,120,120,0.1);border-radius:0 12px 12px 0;letter-spacing:.02em;}
.anum{font-size:1.4rem;font-weight:700;color:var(--accent);opacity:.8;width:28px;flex-shrink:0; text-align:center;}

/* ── Modal / Overlay ──────────────────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.60);z-index:100;display:flex;align-items:flex-end;justify-content:center;padding:14px;backdrop-filter:blur(8px)}
.modal{
  background: var(--bg-color);
  border: 1px solid var(--glass-border);
  border-radius: 20px 20px 16px 16px;
  width: 100%; max-width: 480px; max-height: 88vh; overflow-y: auto; padding: 20px;
}
.mtitle{font-size:1.15rem;font-weight:700;color:var(--text-main);margin-bottom:18px;letter-spacing:-0.01em;}
.macts{display:flex;gap:10px;margin-top:18px}

/* ── Calendar ──────────────────────────────────────── */
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:14px}
.cdname{text-align:center;font-size:.65rem;color:var(--text-muted);padding:4px 0;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.cday{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.85rem;cursor:pointer;position:relative;transition:all .2s ease; border: 1px solid transparent;}
.cday:active{transform:scale(0.9)}
.cday.today{background:var(--accent);color:#fff;font-weight:700}
.cday.sel:not(.today){background:var(--accent-soft);font-weight:600;border-color:var(--accent)}
.cday.hase::after{content:'';position:absolute;bottom:4px;width:4px;height:4px;border-radius:50%;background:var(--accent)}
.cday.today.hase::after{background:rgba(255,255,255,0.8)}
.cday.oth{color:var(--text-muted);opacity:.3;pointer-events:none}
.chdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cmo{font-size:1.1rem;color:var(--text-main);font-weight:600;letter-spacing:.05em}
.evitem{display:flex;gap:12px;align-items:flex-start;padding:12px;background:rgba(120,120,120,0.1);border-radius:12px;margin-bottom:8px;border-left:3px solid var(--accent)}
.evtime{font-size:.8rem;color:var(--text-muted);font-weight:600;white-space:nowrap;min-width:55px;}
.evtit{flex:1;font-size:.9rem;font-weight:500;}

/* ── Meetings ──────────────────────────────────────── */
.swgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.swcard{background:rgba(120,120,120,0.1);border-radius:12px;padding:12px;border:1px solid var(--glass-border)}
.swlbl{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);margin-bottom:6px;font-weight:600}
textarea.swinp{width:100%;background:transparent;border:none;color:var(--text-main);font-family:inherit;font-size:.85rem;resize:none;outline:none;min-height:60px;line-height:1.5}

/* ── Habit Tracker ────────────────────────────────── */
.hab-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -18px;padding:0 18px 10px}
.hab-tbl{border-collapse:collapse;font-size:.75rem;white-space:nowrap; width: 100%;}
.hab-name{text-align:left;padding:8px 10px 8px 0;font-size:.85rem;color:var(--text-main);font-weight:500;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;position:sticky;left:0;background:var(--bg-color);z-index:2; transition: background 0.6s ease;}
.hab-dh{text-align:center;padding:4px 2px;font-size:.65rem;color:var(--text-muted);min-width:24px}
.hab-wh{text-align:center;font-size:.65rem;color:var(--text-main);font-weight:600;padding:4px;border-bottom:1px solid var(--glass-border);letter-spacing:.05em;text-transform:uppercase}
.hab-c{text-align:center;padding:4px 2px}
.hck{width:22px;height:22px;border-radius:6px;border:2px solid var(--glass-border-strong);background:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:.7rem;color:#fff;font-weight:700;transition:all .2s cubic-bezier(0.2, 0.8, 0.2, 1);}
.hck.on{background:var(--accent);border-color:var(--accent)}
.hck.fut{opacity:.2;cursor:default;pointer-events:none}
.hab-prow td{font-size:.7rem;color:var(--text-main);font-weight:600;text-align:center;padding:6px 2px;border-top:1px solid var(--glass-border)}
.hab-prow .hab-name{color:var(--text-muted);font-size:.75rem}

.anl-grid{display:grid;grid-template-columns:1fr auto auto 1fr;gap:0;border-radius:12px;overflow:hidden;border:1px solid var(--glass-border)}
.anl-h{background:rgba(120,120,120,0.15);padding:8px 12px;font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;color:var(--text-main);font-weight:600;border-bottom:1px solid var(--glass-border)}
.anl-c{padding:10px 12px;font-size:.85rem;border-bottom:1px solid var(--glass-border);display:flex;align-items:center; font-weight:500;}
.anl-bar-wrap{flex:1;background:rgba(120,120,120,0.15);border-radius:99px;height:6px;overflow:hidden}
.anl-bar{height:100%;background:var(--accent);border-radius:99px;transition:width .5s cubic-bezier(0.2, 0.8, 0.2, 1);}
.anl-bar.warn{background:var(--warn)}
.anl-bar.bad{background:var(--danger)}

/* ── Budget Planner ───────────────────────────────── */
.bsum{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px}
.bstat{background:rgba(120,120,120,0.1);border-radius:16px;padding:14px 10px;text-align:center;border:1px solid var(--glass-border)}
.bnum{font-size:1.4rem;font-weight:700;line-height:1; letter-spacing: -0.02em;}
.bnum.pos{color:var(--ok)}.bnum.neg{color:var(--danger)}.bnum.neu{color:var(--text-main)}
.blbl{font-size:.7rem;color:var(--text-muted);margin-top:6px;text-transform:uppercase;letter-spacing:.05em; font-weight:600;}

/* ── Search Dropdown (Fitness) ─────────────────────── */
.search-res {
  background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 12px;
  margin-top: 4px; max-height: 200px; overflow-y: auto; backdrop-filter: blur(20px);
}
.search-item {
  padding: 10px 14px; border-bottom: 1px solid var(--glass-border); cursor: pointer;
  font-size: 0.9rem; transition: background 0.2s;
}
.search-item:last-child { border-bottom: none; }
.search-item:active { background: var(--accent-soft); }

/* ── Setup screen ─────────────────────────────────── */
.setup{position:fixed;inset:0;background:var(--bg-color);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;text-align:center}
.setup-t{font-size:2.5rem;color:var(--text-main);margin-bottom:10px;font-weight:700; letter-spacing: -0.03em;}
.setup-s{font-size:1rem;color:var(--text-muted);margin-bottom:32px;line-height:1.5;max-width:300px;}
.setup-f{width:100%;max-width:340px;display:flex;flex-direction:column;gap:14px}

/* ── Stats block ─────────────────────────────────── */
.stat-box { background: rgba(120,120,120,0.1); border-radius: 16px; padding: 14px; text-align: center; flex: 1; }
.stat-val { font-size: 1.3rem; font-weight: 700; color: var(--text-main); margin-bottom: 2px;}
.stat-lbl { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600;}

::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(120,120,120,0.3);border-radius:99px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useRef, useCallback} = React;

/* ─── Gemini API Configuration ─── */
const apiKey = "AIzaSyB2LEetOztbKN-jW3XXtoNjGmHCjWaJ3tA"; // Replace this string with your new key for GitHub Pages

async function callGeminiAPI(prompt, systemInstruction) {
  if (!apiKey || apiKey.includes("PASTE_YOUR") || apiKey.includes("YOUR_API")) {
    return { error: "Missing API Key! Please paste your key at the top of the code." };
  }
  
  // Try these models in order to ensure maximum compatibility with your specific key
  const modelsToTry = ["gemini-2.5-flash", "gemini-2.0-flash", "gemini-1.5-flash-latest", "gemini-1.5-flash", "gemini-pro"];
  
  const payload = {
    contents: [{ parts: [{ text: prompt }] }],
    systemInstruction: { parts: [{ text: systemInstruction }] },
    // Ask for JSON, but we remove the strict responseMimeType config just in case older models reject it
  };

  let lastErrorMsg = "";

  for (const model of modelsToTry) {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
    
    try {
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      
      if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        // If 404 (model not found), log it and try the next model in the list
        if (res.status === 404) {
          console.warn(`Model ${model} not found, trying next...`);
          lastErrorMsg = errData.error?.message || 'Model not found';
          continue; 
        }
        return { error: `API Error ${res.status} (${model}): ${errData.error?.message || 'Check browser console'}` };
      }
      
      const data = await res.json();
      let text = data.candidates?.[0]?.content?.parts?.[0]?.text;
      if(text) {
        // Strip Markdown formatting if Gemini incorrectly wraps the JSON
        text = text.replace(/```json/gi, '').replace(/```/g, '').trim();
        return { data: JSON.parse(text) };
      }
    } catch (e) {
      console.error(`Gemini API Error with ${model}:`, e);
      lastErrorMsg = e.message;
    }
  }
  
  return { error: `API Error 404: None of the standard models were found on your key. Last error: ${lastErrorMsg}` };
}

/* ─── helpers ─── */
const fmt = d => { if(!d) return ''; const x = d instanceof Date ? d : new Date(d + 'T12:00:00'); return x.getFullYear() + '-' + String(x.getMonth()+1).padStart(2,'0') + '-' + String(x.getDate()).padStart(2,'0'); };
const todayStr = () => fmt(new Date());
const genId = () => Math.random().toString(36).slice(2,9);

const calcDay   = s => { const a=new Date(s); a.setHours(0,0,0,0); const b=new Date(); b.setHours(0,0,0,0); return Math.max(1,Math.floor((b-a)/86400000)+1); };
const getSundayOf = d => { const dt=new Date(typeof d==='string'?d+'T12:00:00':d); const dow=dt.getDay(); dt.setDate(dt.getDate()-dow); dt.setHours(12,0,0,0); return dt; };
const calcWeek  = start => { const sm=getSundayOf(start); const tm=getSundayOf(new Date()); return Math.max(1,Math.floor((tm-sm)/604800000)+1); };
const weekNumOf = (start,dateStr) => { const sm=getSundayOf(start); const dm=getSundayOf(dateStr); return Math.max(1,Math.floor((dm-sm)/604800000)+1); };
const calcMonth = s => { const a=new Date(s+'T12:00:00'), b=new Date(); return Math.max(1,(b.getFullYear()-a.getFullYear())*12+(b.getMonth()-a.getMonth())+1); };
const calcYear  = d => Math.max(1,Math.ceil(d/365));
const weekDays = (start,wk) => { const sm=getSundayOf(start); const mon=new Date(sm); mon.setDate(sm.getDate()+(wk-1)*7); return Array.from({length:7},(_,i)=>{ const d=new Date(mon); d.setDate(mon.getDate()+i); return fmt(d); }); };

function PBar({pct,label}){
  const p=Math.min(100,Math.max(0,pct||0));
  return(<div><div className="pwrap"><div className="pbar" style={{width:p+'%'}}/></div>
    <div className="plbl"><span>{label}</span><span>{Math.round(p)}%</span></div></div>);
}
function DateNav({date,setDate,maxToday}){
  const isMax=maxToday&&date>=todayStr();
  const lbl=date===todayStr()?'Today':new Date(date+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
  const go=dir=>{ const d=new Date(date+'T12:00:00'); d.setDate(d.getDate()+dir); setDate(fmt(d)); };
  return(<div className="card" style={{padding:'12px 16px',marginBottom:14}}>
    <div className="dnav">
      <button className="dnbtn" onClick={()=>go(-1)}>‹</button>
      <div className="dlbl">{lbl}</div>
      <button className="dnbtn" onClick={()=>go(1)} disabled={!!isMax} style={{opacity:isMax?.35:1}}>›</button>
    </div></div>);
}

/* ─── Donut Ring ─── */
function Donut({pct, size=88, thick=8, color, bg, label}){
  const c = color || 'var(--accent)';
  const b = bg || 'var(--glass-border-strong)';
  const r=(size-thick)/2, circ=2*Math.PI*r;
  const dash=Math.min(pct,100)/100*circ;
  return(
    <div style={{position:'relative',width:size,height:size,flexShrink:0}}>
      <svg width={size} height={size} style={{transform:'rotate(-90deg)',display:'block'}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={b} strokeWidth={thick}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={c} strokeWidth={thick}
          strokeDasharray={dash+' '+circ} strokeLinecap="round"
          style={{transition:'stroke-dasharray 0.8s cubic-bezier(0.2, 0.8, 0.2, 1)'}}/>
      </svg>
      <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
        <div style={{fontSize:size>70?'1.1rem':'.8rem',fontWeight:700,color:pct>0?c:'var(--text-muted)',lineHeight:1}}>{Math.round(pct)}%</div>
        {label&&<div style={{fontSize:'.55rem',color:'var(--text-muted)',marginTop:2,letterSpacing:'.06em',textTransform:'uppercase',fontWeight:600}}>{label}</div>}
      </div>
    </div>
  );
}

/* ─── Daily ─── */
function DailyDay({dateStr, isToday}){
  const [todos, setTodos] = useState([]);
  const [inp, setInp]     = useState('');
  const [adding, setAdding] = useState(false);

  useEffect(()=>{ setTodos(DB.get('todos_'+dateStr,[])); },[dateStr]);
  const save=u=>{ setTodos(u); DB.set('todos_'+dateStr,u); };
  const add=()=>{ if(!inp.trim()) return; save([...todos,{id:genId(),text:inp.trim(),done:false}]); setInp(''); setAdding(false); };
  const toggle=id=>save(todos.map(t=>t.id===id?{...t,done:!t.done}:t));
  const del=id=>save(todos.filter(t=>t.id!==id));

  const done=todos.filter(t=>t.done).length;
  const pct=todos.length?(done/todos.length)*100:0;
  const dateObj=new Date(dateStr+'T12:00:00');
  const dayName=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][dateObj.getDay()];
  const dateLabel=dateObj.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  const isFuture=dateStr>todayStr();

  return(
    <div className="card" style={{minWidth:'85vw',maxWidth:360,flexShrink:0, padding: 0, overflow: 'hidden', border: isToday ? '1px solid var(--accent)' : ''}}>
      <div style={{background:isToday?'var(--accent-soft)':'rgba(120,120,120,0.1)',padding:'16px',textAlign:'center', borderBottom: '1px solid var(--glass-border)'}}>
        <div style={{fontSize:'1.1rem',fontWeight:700,color:isToday?'var(--accent)':'var(--text-main)', letterSpacing: '-0.02em'}}>{dayName}</div>
        <div style={{fontSize:'.75rem',color:'var(--text-muted)',marginTop:2, fontWeight: 500}}>{dateLabel}{isToday ? ' • Today' : ''}</div>
      </div>
      <div style={{display:'flex',justifyContent:'center',padding:'20px 0 10px'}}>
        <Donut pct={pct} size={100} thick={10} color={isToday?'var(--accent)':'var(--text-main)'}/>
      </div>
      <div style={{display:'flex',justifyContent:'center',gap:20,padding:'0 16px 16px',fontSize:'.75rem',color:'var(--text-muted)', fontWeight: 500}}>
        <span style={{color:'var(--ok)'}}>✓ {done} Done</span>
        <span>— {todos.length-done} Left</span>
      </div>
      <div style={{flex:1,padding:'0 16px 16px',overflowY:'auto',maxHeight:300}}>
        {todos.length===0&&!isFuture&&(
          <div style={{fontSize:'.85rem',color:'var(--text-muted)',textAlign:'center',padding:'12px 0'}}>No tasks yet.</div>
        )}
        {todos.map(t=>(
          <div key={t.id} className="titem" style={{padding: '8px 0'}}>
            <button className={'tchk'+(t.done?' on':'')} onClick={()=>toggle(t.id)}>
              {t.done&&<span style={{color:'#fff',fontSize:'.65rem',fontWeight:700}}>✓</span>}
            </button>
            <div className={`ttxt ${t.done?'done':''}`}>{t.text}</div>
            <button className="tdel" onClick={()=>del(t.id)}>✕</button>
          </div>
        ))}
        {!isFuture&&adding?(
          <div style={{marginTop:12}}>
            <div style={{display:'flex',gap:8}}>
              <input autoFocus className="inp inp-sm" style={{flex:1}} placeholder="Task…" value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==='Enter'&&add()}/>
              <button className="btn btnsm" onClick={add}>Add</button>
            </div>
          </div>
        ):!isFuture&&(
          <button onClick={()=>setAdding(true)}
            style={{marginTop:12,width:'100%',background:'rgba(120,120,120,0.1)', border:'1px dashed var(--glass-border-strong)',
              borderRadius:10,padding:'10px',color:'var(--text-main)',fontSize:'.85rem',cursor:'pointer', fontWeight: 500, transition: 'all 0.2s'}}>
            + Add Task
          </button>
        )}
      </div>
    </div>
  );
}

function DailyTab({dn,wn,mn,yn}){
  const now=new Date();
  const [weekOffset,setWeekOffset]=useState(0);
  const scrollRef=useRef();

  const weekStart=new Date(now); weekStart.setDate(now.getDate()-now.getDay()); weekStart.setHours(12,0,0,0);
  const days=Array.from({length:7},(_,i)=>{
    const d=new Date(weekStart); d.setDate(weekStart.getDate()+weekOffset*7+i);
    return fmt(d);
  });

  const weekLabel=()=>{
    const s=new Date(days[0]+'T12:00:00'), e=new Date(days[6]+'T12:00:00');
    return s.toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' – '+e.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  };

  useEffect(()=>{
    if(scrollRef.current&&weekOffset===0){
      const todayIdx=days.indexOf(todayStr());
      if(todayIdx>=0){ const el=scrollRef.current.children[todayIdx]; if(el) el.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'}); }
    }
  },[]);

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
      <div style={{display:'flex',gap:10,padding:'16px',flexShrink:0}}>
        {[['Day',dn],['Wk',wn],['Mo',mn],['Yr',yn]].map(([l,v])=>(
          <div key={l} className="stat-box"><div className="stat-val">{v}</div><div className="stat-lbl">{l}</div></div>
        ))}
      </div>
      <div style={{display:'flex',alignItems:'center',padding:'0 16px 12px',gap:12,flexShrink:0}}>
        <button className="dnbtn" onClick={()=>setWeekOffset(w=>w-1)}>‹</button>
        <div className="dlbl" style={{fontSize:'.9rem'}}>{weekLabel()}</div>
        <button className="dnbtn" onClick={()=>setWeekOffset(w=>w+1)} disabled={weekOffset>=1} style={{opacity:weekOffset>=1?.35:1}}>›</button>
      </div>
      <div ref={scrollRef}
        style={{display:'flex',gap:14,padding:'0 16px 16px',overflowX:'auto',
          WebkitOverflowScrolling:'touch',flex:1,alignItems:'flex-start',scrollSnapType:'x mandatory'}}>
        {days.map(d=>(
          <div key={d} style={{scrollSnapAlign:'center'}}>
            <DailyDay dateStr={d} isToday={d===todayStr()}/>
          </div>
        ))}
      </div>
    </div>
  );
}

function GoalList({skey,label}){
  const [goals,setGoals]=useState([]);
  const [inp,setInp]=useState('');
  const [aiLoading, setAiLoading] = useState(false);
  const [aiError, setAiError] = useState('');

  useEffect(()=>{ setGoals(DB.get(skey,[])); },[skey]);
  const save=g=>{ setGoals(g); DB.set(skey,g); };
  const add=()=>{ if(!inp.trim()) return; save([...goals,{id:genId(),text:inp.trim(),done:false}]); setInp(''); setAiError(''); };
  const toggle=id=>save(goals.map(g=>g.id===id?{...g,done:!g.done}:g));
  const del=id=>save(goals.filter(g=>g.id!==id));
  
  const handleAIBreakdown = async () => {
    if (!inp.trim()) { setAiError('Type a goal first to break it down.'); return; }
    setAiLoading(true); setAiError('');

    const sysPrompt = `You are an expert productivity coach. The user wants to achieve a goal. Break down the user's goal into exactly 3 to 4 smaller, highly actionable sub-goals or steps. Return ONLY a valid JSON array of objects, where each object has a 'text' property (string).`;
    
    const result = await callGeminiAPI(`Goal: ${inp}`, sysPrompt);
    
    if (result.error) {
      setAiError(result.error);
    } else if (result.data && Array.isArray(result.data)) {
      const newGoals = result.data.map(g => ({ id: genId(), text: g.text, done: false }));
      save([...goals, ...newGoals]);
      setInp('');
    } else {
      setAiError("AI failed to break down the goal. Try again.");
    }
    setAiLoading(false);
  };

  const doneCount = goals.filter(g=>g.done).length;
  const pct = goals.length ? (doneCount/goals.length)*100 : 0;
  
  return(
    <div className="card">
      <div className="ctitle">
        <span>🎯 {label} Goals</span>
      </div>
      
      {goals.length>0&&<PBar pct={pct} label="Progress"/>}
      {goals.length===0&&<div className="empty" style={{padding: '10px 0'}}><div className="eico">🎯</div><div className="etxt">No goals set</div></div>}
      
      <div style={{marginTop: 10, marginBottom: 16}}>
        {goals.map(g=>(
          <div key={g.id} className="gitem">
            <button className={'tchk'+(g.done?' on':'')} onClick={()=>toggle(g.id)}>
              {g.done&&<span style={{color:'#fff',fontSize:'.65rem',fontWeight:700}}>✓</span>}
            </button>
            <div className={`ttxt ${g.done?'done':''}`}>{g.text}</div>
            <button className="tdel" onClick={()=>del(g.id)}>✕</button>
          </div>
        ))}
      </div>
      
      <div className="row" style={{alignItems: 'stretch', flexWrap: 'wrap'}}>
        <input className="inp" style={{minWidth: '100%'}} placeholder="Type a big goal here..." value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==='Enter'&&add()}/>
        <div style={{display: 'flex', gap: 10, width: '100%'}}>
          <button className="btn" onClick={add} style={{flex: 1}}>Add Goal</button>
          <button className={`btn btn-ai ${aiLoading ? 'ai-loading' : ''}`} onClick={handleAIBreakdown} style={{flex: 1}}>
            ✨ AI Break Down
          </button>
        </div>
      </div>
      {aiError && <div className="ai-error">{aiError}</div>}
    </div>
  );
}

    setLog(DB.get('fit_log_'+fd, { foods:[], workouts:[], strength:[], water:0 }));
  }, [fd]);

  const saveSettings = (s) => { setSettings(s); DB.set('fit_settings', s); };
  const saveLog = (l) => { setLog(l); DB.set('fit_log_'+fd, l); };

  // Computed
  const calsIn = log.foods.reduce((s,f) => s + f.cal, 0);
  const proIn  = log.foods.reduce((s,f) => s + f.pro, 0);
  const calsOut = log.workouts.reduce((s,w) => s + w.cal, 0);
  const calsRemaining = Math.round(settings.cal + calsOut - calsIn);
  const calPct = Math.min(100, Math.max(0, (calsIn / (settings.cal + calsOut)) * 100));
  const proPct = Math.min(100, Math.max(0, (proIn / settings.pro) * 100));
  const watPct = Math.min(100, Math.max(0, (log.water / settings.water) * 100));

  // AI Logger Logic
  const handleAILog = async () => {
    if(!aiInput.trim()) return;
    setAiLoading(true); setAiError('');

    if(aiType === 'food') {
      const sysPrompt = `You are a professional nutrition expert. The user will describe a meal they ate. Estimate the total nutritional value. Return ONLY a valid JSON object with the following keys: 'name' (string, a very short 2-4 word descriptive summary), 'cal' (number, estimated total calories), 'pro' (number, estimated total protein in grams). DO NOT return markdown formatting like \`\`\`json, just the raw JSON object.`;
      
      const res = await callGeminiAPI(aiInput, sysPrompt);
      
      if (res.error) {
        setAiError(res.error);
      } else if(res.data && res.data.name && res.data.cal !== undefined) {
         const item = { id:genId(), name: res.data.name + " ✨", cal: Number(res.data.cal), pro: Number(res.data.pro||0), desc: 'AI Logged' };
         saveLog({...log, foods: [item, ...log.foods]});
         setAiInput('');
      } else { setAiError('AI could not process this meal. Try being more specific.'); }
    } else {
      const sysPrompt = `You are a professional fitness expert. The user will describe a physical activity they performed. Estimate the calories burned and duration. Return ONLY a valid JSON object with the following keys: 'name' (string, a very short 2-4 word descriptive summary of the activity), 'cal' (number, estimated calories burned), 'mins' (number, estimated duration in minutes). DO NOT return markdown formatting like \`\`\`json, just the raw JSON object.`;
      
      const res = await callGeminiAPI(aiInput, sysPrompt);
      
      if (res.error) {
        setAiError(res.error);
      } else if(res.data && res.data.name && res.data.cal !== undefined) {
         const item = { id:genId(), name: res.data.name + " ✨", cal: Number(res.data.cal), mins: Number(res.data.mins||0) };
         saveLog({...log, workouts: [item, ...log.workouts]});
         setAiInput('');
      } else { setAiError('AI could not process this workout.'); }
    }
    setAiLoading(false);
  };

  // Search logic
  useEffect(()=>{
    if(fQuery.length > 1){
      const res = DB_FOODS.filter(f=>f.name.toLowerCase().includes(fQuery.toLowerCase()));
      setFRes(res);
    } else { setFRes([]); setFSel(null); }
  }, [fQuery]);

  useEffect(()=>{
    if(wQuery.length > 1){
      const res = DB_EXERCISES.filter(e=>e.name.toLowerCase().includes(wQuery.toLowerCase()));
      setWRes(res);
    } else { setWRes([]); setWSel(null); }
  }, [wQuery]);

  const addFood = () => {
    if(fSel){
      const item = { id:genId(), name: fSel.name, cal: Math.round(fSel.cal*fMult), pro: Math.round(fSel.pro*fMult), desc: `${fMult}x ${fSel.unit}` };
      saveLog({...log, foods: [item, ...log.foods]});
      setFQuery(''); setFSel(null); setFMult(1);
    } else if(fCustom.name && fCustom.cal) {
      const item = { id:genId(), name: fCustom.name, cal: Number(fCustom.cal), pro: Number(fCustom.pro||0), desc: 'Custom' };
      saveLog({...log, foods: [item, ...log.foods]});
      setFCustom({name:'', cal:'', pro:''});
    }
  };

  const addWorkout = () => {
    if(wSel && wMins > 0) {
      const burned = Math.round(wSel.calPerMin * wMins);
      const item = { id:genId(), name: wSel.name, cal: burned, mins: wMins };
      saveLog({...log, workouts: [item, ...log.workouts]});
      setWQuery(''); setWSel(null); setWMins(30);
    }
  };

  const addStrength = () => {
    if(!sEx || !sWt || !sSets || !sReps) return;
    const item = { id:genId(), ex: sEx, wt: sWt, sets: sSets, reps: sReps };
    saveLog({...log, strength: [item, ...log.strength]});
    
    // Save to history
    const hist = {...strHistory};
    const key = sEx.toLowerCase().trim();
    if(!hist[key]) hist[key] = [];
    hist[key].push({ date: fd, wt: sWt, sets: sSets, reps: sReps });
    setStrHistory(hist);
    DB.set('fit_history', hist);

    setSEx(''); setSWt(''); setSSets(''); setSReps('');
  };

  const delLog = (type, id) => { saveLog({...log, [type]: log[type].filter(x=>x.id!==id)}); };
  const addWater = (n) => { saveLog({...log, water: Math.max(0, log.water + n)}); };

  return(
    <div className="sec">
      <DateNav date={fd} setDate={setFd} maxToday/>
      
      <div className="stabs">
        <button className={'stab'+(sub==='log'?' on':'')} onClick={()=>setSub('log')}>Day Log</button>
        <button className={'stab'+(sub==='progress'?' on':'')} onClick={()=>setSub('progress')}>Gym Progress</button>
        <button className={'stab'+(sub==='settings'?' on':'')} onClick={()=>setSub('settings')}>Goals</button>
      </div>

      {sub==='log' && (
        <>
          <div className="card" style={{display:'flex', alignItems:'center', gap: 16}}>
            <Donut pct={calPct} size={100} thick={10} color="var(--accent)"/>
            <div style={{flex:1}}>
              <div style={{fontSize: '1.4rem', fontWeight: 700}}>{calsRemaining}</div>
              <div style={{fontSize: '0.8rem', color: 'var(--text-muted)', marginBottom: 8}}>Calories Remaining</div>
              <div style={{display:'flex', gap: 16, fontSize: '0.75rem', fontWeight: 600}}>
                <div><span style={{color:'var(--text-muted)'}}>In:</span> {calsIn}</div>
                <div><span style={{color:'var(--ok)'}}>Burn:</span> {calsOut}</div>
              </div>
            </div>
          </div>

          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap: 14, marginBottom: 14}}>
            <div className="card" style={{marginBottom: 0, textAlign:'center'}}>
              <div style={{fontSize:'0.7rem', color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:8}}>Protein (g)</div>
              <Donut pct={proPct} size={60} thick={6} color="#f43f5e"/>
              <div style={{marginTop:8, fontSize:'0.85rem', fontWeight:600}}>{proIn} / {settings.pro}</div>
            </div>
            <div className="card" style={{marginBottom: 0, textAlign:'center'}}>
              <div style={{fontSize:'0.7rem', color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:8}}>Water (Glass)</div>
              <Donut pct={watPct} size={60} thick={6} color="#0ea5e9"/>
              <div style={{display:'flex', alignItems:'center', justifyContent:'center', gap: 8, marginTop: 8}}>
                <button className="dnbtn" style={{width:24,height:24,fontSize:'.9rem'}} onClick={()=>addWater(-1)}>-</button>
                <div style={{fontSize:'0.85rem', fontWeight:600}}>{log.water}/{settings.water}</div>
                <button className="dnbtn" style={{width:24,height:24,fontSize:'.9rem'}} onClick={()=>addWater(1)}>+</button>
              </div>
            </div>
          </div>

          {/* AI Smart Logger Card */}
          <div className="card" style={{border: '1px solid rgba(139, 92, 246, 0.4)'}}>
            <div className="ctitle" style={{color: '#d946ef'}}>
              <span>✨ AI Smart Logger</span>
            </div>
            <div className="stabs" style={{marginBottom: 10}}>
              <button className={'stab'+(aiType==='food'?' on':'')} style={aiType==='food'?{background:'#8b5cf6', borderColor:'#8b5cf6'}:{}} onClick={()=>setAiType('food')}>Meal</button>
              <button className={'stab'+(aiType==='workout'?' on':'')} style={aiType==='workout'?{background:'#8b5cf6', borderColor:'#8b5cf6'}:{}} onClick={()=>setAiType('workout')}>Workout</button>
            </div>
            <textarea 
               className="inp" 
               style={{minHeight: 60}}
               placeholder={aiType === 'food' ? "e.g. 'I ate 3 scrambled eggs with two slices of whole wheat toast and an avocado'" : "e.g. 'I ran for 45 minutes at a steady pace and did 15 mins of yoga'"} 
               value={aiInput} 
               onChange={e=>setAiInput(e.target.value)}>
            </textarea>
            <div className="row" style={{marginTop: 8}}>
              <button className={`btn btnfull btn-ai ${aiLoading ? 'ai-loading' : ''}`} onClick={handleAILog}>
                ✨ Estimate {aiType === 'food' ? 'Calories & Macros' : 'Burn & Duration'}
              </button>
            </div>
            {aiError && <div className="ai-error">{aiError}</div>}
          </div>

          <div className="card">
            <div className="ctitle">🥑 Manual Food Log</div>
            <input className="inp" placeholder="Search database (e.g., Chicken)..." value={fQuery} onChange={e=>setFQuery(e.target.value)} />
            {fRes.length > 0 && !fSel && (
              <div className="search-res">
                {fRes.map(r=><div key={r.name} className="search-item" onClick={()=>{setFSel(r);setFQuery(r.name);setFRes([]);}}>
                  <strong>{r.name}</strong> <span style={{color:'var(--text-muted)', fontSize:'.8rem'}}>— {r.cal} kcal, {r.pro}g pro per {r.unit}</span>
                </div>)}
              </div>
            )}
            {fSel && (
              <div className="row" style={{alignItems:'center'}}>
                <span style={{fontSize:'.85rem'}}>Multiplier ({fSel.unit}):</span>
                <input className="inp inp-sm" type="number" min="0.1" step="0.1" value={fMult} onChange={e=>setFMult(e.target.value)}/>
                <button className="btn" onClick={addFood}>Add</button>
                <button className="btn btng" onClick={()=>{setFSel(null);setFQuery('');}}>✕</button>
              </div>
            )}
            {!fSel && fQuery.length > 0 && fRes.length === 0 && (
              <div style={{marginTop: 10}}>
                <div style={{fontSize:'.8rem', color:'var(--text-muted)', marginBottom: 8}}>Not found. Add custom:</div>
                <div className="row">
                  <input className="inp inp-sm" placeholder="Name" value={fCustom.name} onChange={e=>setFCustom({...fCustom, name:e.target.value})}/>
                  <input className="inp inp-sm" type="number" placeholder="Kcal" value={fCustom.cal} onChange={e=>setFCustom({...fCustom, cal:e.target.value})}/>
                  <input className="inp inp-sm" type="number" placeholder="Pro (g)" value={fCustom.pro} onChange={e=>setFCustom({...fCustom, pro:e.target.value})}/>
                  <button className="btn btnsm" onClick={addFood}>Add</button>
                </div>
              </div>
            )}

            {log.foods.length > 0 && <div style={{marginTop: 16, paddingTop: 16, borderTop: '1px solid var(--glass-border)'}}>
              {log.foods.map(f=>(
                <div key={f.id} className="gitem" style={{padding:'8px 0'}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:'.9rem', fontWeight:600}}>{f.name}</div>
                    <div style={{fontSize:'.75rem', color:'var(--text-muted)'}}>{f.desc} • {f.cal} kcal • {f.pro}g pro</div>
                  </div>
                  <button className="tdel" onClick={()=>delLog('foods', f.id)}>✕</button>
                </div>
              ))}
            </div>}
          </div>

          <div className="card">
            <div className="ctitle">🔥 Manual Cardio Log</div>
            <input className="inp" placeholder="Search activity (e.g., Running)..." value={wQuery} onChange={e=>setWQuery(e.target.value)} />
            {wRes.length > 0 && !wSel && (
              <div className="search-res">
                {wRes.map(r=><div key={r.name} className="search-item" onClick={()=>{setWSel(r);setWQuery(r.name);setWRes([]);}}>
                  <strong>{r.name}</strong> <span style={{color:'var(--text-muted)', fontSize:'.8rem'}}>— ~{r.calPerMin} kcal/min</span>
                </div>)}
              </div>
            )}
             {wSel && (
              <div className="row" style={{alignItems:'center'}}>
                <span style={{fontSize:'.85rem'}}>Minutes:</span>
                <input className="inp inp-sm" type="number" min="1" value={wMins} onChange={e=>setWMins(e.target.value)}/>
                <button className="btn" onClick={addWorkout}>Add</button>
                <button className="btn btng" onClick={()=>{setWSel(null);setWQuery('');}}>✕</button>
              </div>
            )}
            {log.workouts.length > 0 && <div style={{marginTop: 16, paddingTop: 16, borderTop: '1px solid var(--glass-border)'}}>
              {log.workouts.map(w=>(
                <div key={w.id} className="gitem" style={{padding:'8px 0'}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:'.9rem', fontWeight:600}}>{w.name}</div>
                    <div style={{fontSize:'.75rem', color:'var(--text-muted)'}}>{w.mins} mins • <span style={{color:'var(--ok)'}}>{w.cal} kcal burned</span></div>
                  </div>
                  <button className="tdel" onClick={()=>delLog('workouts', w.id)}>✕</button>
                </div>
              ))}
            </div>}
          </div>

          <div className="card">
            <div className="ctitle">🏋️ Strength Log</div>
            <div className="frow"><input className="inp inp-sm" placeholder="Exercise (e.g., Bench Press)" value={sEx} onChange={e=>setSEx(e.target.value)}/></div>
            <div className="row" style={{marginTop:0}}>
              <input className="inp inp-sm" placeholder="Weight (kg)" type="number" value={sWt} onChange={e=>setSWt(e.target.value)}/>
              <input className="inp inp-sm" placeholder="Sets" type="number" value={sSets} onChange={e=>setSSets(e.target.value)}/>
              <input className="inp inp-sm" placeholder="Reps" type="number" value={sReps} onChange={e=>setSReps(e.target.value)}/>
            </div>
            <button className="btn btnfull" style={{marginTop:12}} onClick={addStrength}>Log Set</button>

            {log.strength.length > 0 && <div style={{marginTop: 16, paddingTop: 16, borderTop: '1px solid var(--glass-border)'}}>
              {log.strength.map(s=>(
                <div key={s.id} className="gitem" style={{padding:'8px 0'}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:'.9rem', fontWeight:600}}>{s.ex}</div>
                    <div style={{fontSize:'.75rem', color:'var(--accent)'}}>{s.wt} kg × {s.sets} sets × {s.reps} reps</div>
                  </div>
                  <button className="tdel" onClick={()=>delLog('strength', s.id)}>✕</button>
                </div>
              ))}
            </div>}
          </div>
        </>
      )}

      {sub==='progress' && (
        <div className="card">
          <div className="ctitle">📈 Strength History</div>
          {Object.keys(strHistory).length === 0 ? (
            <div className="empty"><div className="etxt">No strength data logged yet.</div></div>
          ) : (
            Object.keys(strHistory).sort().map(ex => (
              <div key={ex} style={{marginBottom: 20}}>
                <div style={{fontSize:'.95rem', fontWeight:700, textTransform:'capitalize', marginBottom:8, color:'var(--accent)'}}>{ex}</div>
                <div style={{background:'rgba(120,120,120,0.1)', borderRadius:10, padding: 12}}>
                  {strHistory[ex].slice(-5).map((log, i) => (
                    <div key={i} style={{display:'flex', justifyContent:'space-between', fontSize:'.85rem', padding:'6px 0', borderBottom: i<Math.min(strHistory[ex].length,5)-1?'1px solid var(--glass-border)':'none'}}>
                      <span style={{color:'var(--text-muted)'}}>{log.date}</span>
                      <span style={{fontWeight:600}}>{log.wt} kg • {log.sets}×{log.reps}</span>
                    </div>
                  ))}
                  {strHistory[ex].length > 5 && <div style={{fontSize:'.75rem', color:'var(--text-muted)', textAlign:'center', marginTop:6}}>Showing last 5 entries</div>}
                </div>
              </div>
            ))
          )}
        </div>
      )}

      {sub==='settings' && (
        <div className="card">
          <div className="ctitle">⚙️ Daily Targets</div>
          <div className="frow">
            <label className="flbl">Calories Goal</label>
            <input className="inp" type="number" value={settings.cal} onChange={e=>saveSettings({...settings, cal:Number(e.target.value)})}/>
          </div>
          <div className="frow">
            <label className="flbl">Protein Goal (g)</label>
            <input className="inp" type="number" value={settings.pro} onChange={e=>saveSettings({...settings, pro:Number(e.target.value)})}/>
          </div>
          <div className="frow">
            <label className="flbl">Water Goal (Glasses)</label>
            <input className="inp" type="number" value={settings.water} onChange={e=>saveSettings({...settings, water:Number(e.target.value)})}/>
          </div>
        </div>
      )}
    </div>
  );
}

/* ─── Affirmations ─── */
function AffirmTab(){
  const [list,setList]=useState([]);
  const [inp,setInp]=useState('');
  const [editId,setEditId]=useState(null);
  const [editTxt,setEditTxt]=useState('');
  useEffect(()=>{ setList(DB.get('affirmations',[])); },[]);
  const save=l=>{ setList(l); DB.set('affirmations',l); };
  const add=()=>{ if(!inp.trim()) return; save([...list,{id:genId(),text:inp.trim()}]); setInp(''); };
  const del=id=>save(list.filter(a=>a.id!==id));
  const saveEdit=()=>{ save(list.map(a=>a.id===editId?{...a,text:editTxt}:a)); setEditId(null); };
  return(
    <div className="sec">
      <div className="gquote">"I am fearfully and wonderfully made." — Psalm 139:14</div>
      <div className="card">
        <div className="ctitle">☀ Daily Affirmations</div>
        {list.length===0&&<div className="empty"><div className="eico">✨</div><div className="etxt">Add your daily affirmations to speak life</div></div>}
        {list.map((a,i)=>(
          <div key={a.id} className="aitem">
            <div className="anum">{i+1}</div>
            {editId===a.id?(
              <><input className="inp inp-sm" value={editTxt} autoFocus onChange={e=>setEditTxt(e.target.value)} onKeyDown={e=>e.key==='Enter'&&saveEdit()} style={{flex:1}}/><button className="btn btnsm" onClick={saveEdit}>Save</button></>
            ):(
              <><div className="atxt" onClick={()=>{setEditId(a.id);setEditTxt(a.text);}}>{a.text}</div><button className="tdel" onClick={()=>del(a.id)}>✕</button></>
            )}
          </div>))}
        <div className="row">
          <input className="inp" placeholder="I am…" value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==='Enter'&&add()}/>
          <button className="btn" onClick={add}>Add</button>
        </div>
      </div>
    </div>
  );
}

/* ─── Calendar ─── */
function CalTab(){
  const now=new Date();
  const [yr,setYr]=useState(now.getFullYear());
  const [mo,setMo]=useState(now.getMonth());
  const [sel,setSel]=useState(todayStr());
  const [events,setEvents]=useState([]);
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({title:'',st:'',et:'',type:'event',rec:'none'});
  useEffect(()=>{
    let evs=DB.get('calevents',[]);
    if(!evs.some(e=>e.id==='keith_weekly')){
      evs=[...evs,{id:'keith_weekly',title:'Weekly Meeting — Keith',st:'19:00',et:'20:00',type:'meeting',rec:'sun',dk:null}];
      DB.set('calevents',evs);
    }
    setEvents(evs);
  },[]);
  const saveEvs=e=>{ setEvents(e); DB.set('calevents',e); };
  const evOn=dk=>events.filter(e=>e.rec==='sun'?new Date(dk+'T12:00:00').getDay()===0:e.dk===dk);
  const first=new Date(yr,mo,1).getDay(),last=new Date(yr,mo+1,0).getDate(),prev=new Date(yr,mo,0).getDate();
  const cells=[];
  for(let i=first-1;i>=0;i--) cells.push({d:prev-i,cur:false});
  for(let d=1;d<=last;d++) cells.push({d,cur:true});
  while(cells.length%7!==0) cells.push({d:cells.length-last-first+1,cur:false});
  const navMo=dir=>{ let m=mo+dir,y=yr; if(m<0){m=11;y--;}if(m>11){m=0;y++;} setMo(m);setYr(y); };
  const addEv=()=>{ if(!form.title.trim()) return; saveEvs([...events,{id:genId(),...form,dk:sel}]); setForm({title:'',st:'',et:'',type:'event',rec:'none'}); setModal(false); };
  const selEvs=evOn(sel);
  const selLbl=new Date(sel+'T12:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
  return(
    <div className="sec">
      <div className="card">
        <div className="chdr">
          <button className="dnbtn" onClick={()=>navMo(-1)}>‹</button>
          <div className="cmo">{MONTHS[mo]} {yr}</div>
          <button className="dnbtn" onClick={()=>navMo(1)}>›</button>
        </div>
        <div className="cgrid">
          {DAYS.map(d=><div key={d} className="cdname">{d.substring(0,3)}</div>)}
          {cells.map((c,i)=>{ const dk=c.cur?fmt(new Date(yr,mo,c.d)):''; const isTdy=dk===todayStr(),isSel=dk===sel,hasE=dk&&evOn(dk).length>0; return(
            <div key={i} className={`cday${!c.cur?' oth':''}${isTdy?' today':''}${isSel&&!isTdy?' sel':''}${hasE?' hase':''}`} onClick={()=>c.cur&&setSel(dk)}>{c.d}</div>);})}
        </div>
      </div>
      <div className="card">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:11}}>
          <div className="ctitle" style={{marginBottom:0}}>{selLbl}</div>
