/* ─── Habits Tracker ─── */
function HabitsTab(){
  const now = new Date();
  const [yr,setYr]   = useState(now.getFullYear());
  const [mo,setMo]   = useState(now.getMonth());
  const [habits,setHabits] = useState([]);
  const [checks,setChecks] = useState({});
  const [newHab,setNewHab] = useState('');
  const [showAdd,setShowAdd] = useState(false);

  const moKey = `${yr}-${String(mo+1).padStart(2,'0')}`;
  const daysInMo = new Date(yr,mo+1,0).getDate();
  const todayD = now.getFullYear()===yr && now.getMonth()===mo ? now.getDate() : (now.getFullYear()>yr||(now.getFullYear()===yr&&now.getMonth()>mo)?daysInMo+1:0);

  useEffect(()=>{
    const h = DB.get('habits_list', DEFAULT_HABITS.map((t,i)=>({id:'h'+i,text:t})));
    setHabits(h);
    setChecks(DB.get('habits_checks_'+moKey,{}));
  },[moKey]);

  const saveHabits = h=>{ setHabits(h); DB.set('habits_list',h); };
  const saveChecks = c=>{ setChecks(c); DB.set('habits_checks_'+moKey,c); };

  const toggle = (hid,day)=>{
    if(day>todayD) return;
    const k=hid+'_'+day;
    const nc={...checks,[k]:!checks[k]};
    if(!nc[k]) delete nc[k];
    saveChecks(nc);
  };

  const addHabit=()=>{ if(!newHab.trim()) return; saveHabits([...habits,{id:genId(),text:newHab.trim()}]); setNewHab(''); setShowAdd(false); };
  const delHabit=id=>saveHabits(habits.filter(h=>h.id!==id));
  const navMo=dir=>{ let m=mo+dir,y=yr; if(m<0){m=11;y--;}if(m>11){m=0;y++;} setMo(m);setYr(y); };

  const weeks=[];
  for(let d=1;d<=daysInMo;d+=7) weeks.push({wk:Math.ceil(d/7),days:Array.from({length:Math.min(7,daysInMo-d+1)},(_,i)=>d+i)});

  const habStats = habits.map(h=>{
    const possible = Math.min(daysInMo, todayD-1+(todayD<=daysInMo?1:0));
    const done = Object.keys(checks).filter(k=>k.startsWith(h.id+'_')&&checks[k]).length;
    return {id:h.id, done, possible};
  });

  const wkPcts = weeks.map(({wk,days})=>{
    const pastDays = days.filter(d=>d<=todayD);
    if(!pastDays.length||!habits.length) return null;
    const total = pastDays.length * habits.length;
    const done  = pastDays.reduce((s,d)=>s+habits.filter(h=>checks[h.id+'_'+d]).length, 0);
    return Math.round((done/total)*100);
  });

  const monthDone = habStats.reduce((s,h)=>s+h.done,0);
  const monthPoss = habStats.reduce((s,h)=>s+h.possible,0);
  const monthPct  = monthPoss>0?Math.round((monthDone/monthPoss)*100):0;

  const dayName = d => { const dt=new Date(yr,mo,d); return DAYS[dt.getDay()].slice(0,1); };

  return(
    <div className="sec">
      <div className="card" style={{padding:'12px 16px',marginBottom:14}}>
        <div className="dnav">
          <button className="dnbtn" onClick={()=>navMo(-1)}>‹</button>
          <div className="dlbl">{MONTHS[mo]} {yr} — {monthPct}%</div>
          <button className="dnbtn" onClick={()=>navMo(1)} disabled={yr===now.getFullYear()&&mo===now.getMonth()} style={{opacity:yr===now.getFullYear()&&mo===now.getMonth()?.35:1}}>›</button>
        </div>
      </div>
      <div className="card" style={{padding:'16px 0 10px'}}>
        <div style={{padding:'0 18px 12px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div className="ctitle" style={{marginBottom:0}}>☑ Habit Tracker</div>
          <button className="btn btnsm" onClick={()=>setShowAdd(v=>!v)}>+ Habit</button>
        </div>
        {showAdd&&(
          <div style={{padding:'0 18px 12px',display:'flex',gap:10}}>
            <input className="inp inp-sm" placeholder="New habit…" value={newHab} autoFocus
              onChange={e=>setNewHab(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addHabit()}/>
            <button className="btn btnsm" onClick={addHabit}>Add</button>
          </div>
        )}
        <div className="hab-wrap">
          <table className="hab-tbl">
            <thead>
              <tr>
                <th className="hab-name" style={{fontSize:'.65rem',color:'var(--text-muted)',fontWeight:600,paddingBottom:4,letterSpacing:'.05em',textTransform:'uppercase'}}>My Habits</th>
                {weeks.map(({wk,days})=><th key={wk} className="hab-wh" colSpan={days.length}>Wk {wk}</th>)}
              </tr>
              <tr>
                <th className="hab-name" style={{paddingTop:2}}></th>
                {weeks.flatMap(({days})=>days.map(d=>(
                  <th key={d} className="hab-dh">
                    <div style={{color:d===todayD?'var(--accent)':'',fontWeight:d===todayD?700:500}}>{d}</div>
                    <div style={{fontSize:'.55rem',opacity:.7}}>{dayName(d)}</div>
                  </th>
                )))}
              </tr>
            </thead>
            <tbody>
              {habits.map(h=>(
                <tr key={h.id}>
                  <td className="hab-name">
                    <span style={{cursor:'pointer',opacity:.5}} onClick={()=>delHabit(h.id)} title="remove">✕ </span>
                    {h.text}
                  </td>
                  {weeks.flatMap(({days})=>days.map(d=>(
                    <td key={d} className="hab-c">
                      <button className={`hck ${checks[h.id+'_'+d]?'on':''} ${d>todayD?'fut':''}`}
                        onClick={()=>toggle(h.id,d)}>
                        {checks[h.id+'_'+d]?'✓':''}
                      </button>
                    </td>
                  )))}
                </tr>
              ))}
              <tr className="hab-prow">
                <td className="hab-name">Progress</td>
                {weeks.map(({wk,days},wi)=>(
                  <td key={wk} colSpan={days.length} style={{textAlign:'center',fontSize:'.7rem',
                    color:wkPcts[wi]!==null?(wkPcts[wi]>=80?'var(--ok)':wkPcts[wi]>=50?'var(--accent)':'var(--danger)'):'var(--text-muted)',
                    fontWeight:600,paddingTop:6,borderTop:'1px solid var(--glass-border)'}}>
                    {wkPcts[wi]!==null?wkPcts[wi]+'%':'—'}
                  </td>
                ))}
              </tr>
            </tbody>
          </table>
        </div>
      </div>
      <div className="card">
        <div className="ctitle">Analysis</div>
        <div className="anl-grid">
          <div className="anl-h">Habit</div>
          <div className="anl-h" style={{textAlign:'center'}}>Goal</div>
          <div className="anl-h" style={{textAlign:'center'}}>Done</div>
          <div className="anl-h">Progress</div>
          {habits.map(h=>{
            const st=habStats.find(s=>s.id===h.id)||{done:0,possible:0};
            const pct=st.possible>0?Math.round((st.done/st.possible)*100):0;
            const barCls=pct>=80?'':pct>=50?'warn':'bad';
            return(<React.Fragment key={h.id}>
              <div className="anl-c">{h.text}</div>
              <div className="anl-c" style={{justifyContent:'center'}}>{st.possible}</div>
              <div className="anl-c" style={{justifyContent:'center'}}>{st.done}</div>
              <div className="anl-c" style={{gap:10}}>
                <div className="anl-bar-wrap"><div className={`anl-bar ${barCls}`} style={{width:pct+'%'}}/></div>
                <span style={{fontSize:'.75rem',color:'var(--text-muted)',flexShrink:0,width:32,textAlign:'right'}}>{pct}%</span>
              </div>
            </React.Fragment>);
          })}
        </div>
        <div style={{marginTop:16,display:'flex',alignItems:'center',gap:12,background:'rgba(120,120,120,0.1)',borderRadius:12,padding:'14px 16px',border:'1px solid var(--glass-border)'}}>
          <div style={{flex:1}}>
            <div style={{fontSize:'.75rem',color:'var(--text-muted)',marginBottom:6,letterSpacing:'.05em',textTransform:'uppercase',fontWeight:600}}>Overall Month Progress</div>
            <div className="anl-bar-wrap" style={{height:8}}><div className="anl-bar" style={{width:monthPct+'%'}}/></div>
          </div>
          <div style={{fontSize:'1.6rem',color:'var(--accent)',fontWeight:700}}>{monthPct}%</div>
        </div>
      </div>
    </div>
  );
}

/* ─── Budget Planner ─── */
function BudgetTab(){
  const now=new Date();
  const [yr,setYr]=useState(now.getFullYear());
  const [mo,setMo]=useState(now.getMonth());
  const [sub,setSub]=useState('overview');
  const [budgets,setBudgets]=useState({});
  const [income,setIncome]=useState({salary:'',other:'',other2:''});
  const [txs,setTxs]=useState([]);
  const [form,setForm]=useState({desc:'',amount:'',catId:'groceries',type:'expense',date:todayStr()});
  const [showForm,setShowForm]=useState(false);
  const [savingGoal,setSavingGoal]=useState('');
  const moKey=yr+'-'+String(mo+1).padStart(2,'0');
  useEffect(()=>{
    setBudgets(DB.get('bud_budgets_'+moKey,{}));
    setIncome(DB.get('bud_income_'+moKey,{salary:'',other:'',other2:''}));
    setTxs(DB.get('bud_txs_'+moKey,[]));
    setSavingGoal(DB.get('bud_saving_goal',''));
  },[moKey]);
  const saveBudgets=b=>{setBudgets(b);DB.set('bud_budgets_'+moKey,b);};
  const saveIncome=v=>{setIncome(v);DB.set('bud_income_'+moKey,v);};
  const saveTxs=t=>{setTxs(t);DB.set('bud_txs_'+moKey,t);};
  const navMo=dir=>{let m=mo+dir,y=yr;if(m<0){m=11;y--;}if(m>11){m=0;y++;}setMo(m);setYr(y);};
  const totalIncome=(parseFloat(income.salary)||0)+(parseFloat(income.other)||0)+(parseFloat(income.other2)||0);
  const expenseTxs=txs.filter(t=>t.type==='expense');
  const totalSpent=expenseTxs.reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
  const savings=totalIncome-totalSpent;
  const savGoalNum=parseFloat(savingGoal)||0;
  const spentByCat=cid=>expenseTxs.filter(t=>t.catId===cid).reduce((s,t)=>s+(parseFloat(t.amount)||0),0);
  const totalBudgeted=BUD_CATS.reduce((s,c)=>s+(parseFloat(budgets[c.id])||0),0);
  const overallPct=totalBudgeted>0?Math.min(100,(totalSpent/totalBudgeted)*100):0;
  const fp=n=>`£${(parseFloat(n)||0).toFixed(2)}`;
  const f2=n=>n<0?`-£${Math.abs(n).toFixed(2)}`:`£${n.toFixed(2)}`;
  const addTx=()=>{
    if(!form.desc.trim()||!form.amount) return;
    saveTxs([{id:genId(),...form,amount:parseFloat(form.amount)},...txs]);
    setForm({desc:'',amount:'',catId:'groceries',type:'expense',date:todayStr()});
    setShowForm(false);
  };
  const getMonthSpent=m=>{ const mk=yr+'-'+String(m+1).padStart(2,'0'); return DB.get('bud_txs_'+mk,[]).filter(x=>x.type==='expense').reduce((s,x)=>s+(parseFloat(x.amount)||0),0); };
  const getMonthIncome=m=>{ const mk=yr+'-'+String(m+1).padStart(2,'0'); const inc=DB.get('bud_income_'+mk,{salary:'',other:'',other2:''}); return (parseFloat(inc.salary)||0)+(parseFloat(inc.other)||0)+(parseFloat(inc.other2)||0); };
  const getMonthCatSpent=(m,cid)=>{ const mk=yr+'-'+String(m+1).padStart(2,'0'); return DB.get('bud_txs_'+mk,[]).filter(x=>x.type==='expense'&&x.catId===cid).reduce((s,x)=>s+(parseFloat(x.amount)||0),0); };

  return(
    <div className="sec">
      <div className="card" style={{padding:'12px 16px',marginBottom:14}}>
        <div className="dnav">
          <button className="dnbtn" onClick={()=>navMo(-1)}>‹</button>
          <div className="dlbl">{FULL_MONTHS[mo]} {yr}</div>
          <button className="dnbtn" onClick={()=>navMo(1)}>›</button>
        </div>
      </div>
      <div className="stabs">
        {[['overview','Overview'],['monthly','Monthly'],['annual','Annual'],['income','Income'],['transactions','Transactions']].map(([id,lbl])=>(
          <button key={id} className={'stab'+(sub===id?' on':'')} onClick={()=>setSub(id)}>{lbl}</button>
        ))}
      </div>

      {sub==='overview'&&(
        <>
          <div className="bsum">
            <div className="bstat"><div className="bnum neu">{fp(totalIncome)}</div><div className="blbl">Income</div></div>
            <div className="bstat"><div className="bnum neg">{fp(totalSpent)}</div><div className="blbl">Spent</div></div>
            <div className="bstat"><div className={`bnum ${savings>=0?'pos':'neg'}`}>{f2(savings)}</div><div className="blbl">Left</div></div>
          </div>
          <div className="card">
            <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:16}}>
              <Donut pct={overallPct} size={90} thick={9} color={overallPct>90?'var(--danger)':overallPct>75?'var(--warn)':'var(--accent)'} label="budget"/>
              <div style={{flex:1}}>
                <div style={{fontSize:'.9rem',fontWeight:700,marginBottom:4,letterSpacing:'-0.01em'}}>Budget Overview</div>
                <div style={{fontSize:'.8rem',color:'var(--text-muted)',marginBottom:10}}>{fp(totalSpent)} spent of {fp(totalBudgeted)} budgeted</div>
                {savGoalNum>0&&(
                  <div>
                    <div style={{fontSize:'.75rem',color:'var(--text-muted)',marginBottom:4, fontWeight:500}}>Saving Goal: {fp(savGoalNum)}</div>
                    <div className="pwrap"><div className="pbar" style={{width:Math.min(100,(savings/savGoalNum)*100)+'%', background:'var(--ok)'}}/></div>
                    <div style={{fontSize:'.75rem',color:'var(--ok)',marginTop:4, fontWeight:600}}>{fp(Math.max(0,savings))} saved ({Math.round(Math.min(100,(savings/savGoalNum)*100))}%)</div>
                  </div>
                )}
              </div>
            </div>
            <div style={{display:'flex',justifyContent:'flex-end',marginBottom:12}}>
              <button className="btn btnsm" onClick={()=>setShowForm(v=>!v)}>+ Transaction</button>
            </div>
            {showForm&&(
              <div style={{background:'rgba(120,120,120,0.1)',borderRadius:12,padding:16,marginBottom:16,border:'1px solid var(--glass-border)'}}>
                <div style={{fontSize:'.85rem',fontWeight:700,color:'var(--text-main)',marginBottom:12,letterSpacing:'-0.01em'}}>Add Transaction</div>
                <div style={{display:'flex',gap:8,marginBottom:12}}>
                  {['expense','income'].map(t=>(
                    <button key={t} className={'btn btnsm '+(form.type===t?'':'btng')} onClick={()=>setForm(f=>({...f,type:t}))} style={{flex:1,textTransform:'capitalize'}}>{t}</button>))}
                </div>
                <div className="frow"><label className="flbl">Description</label><input className="inp inp-sm" placeholder="e.g. Tesco shop" value={form.desc} onChange={e=>setForm(f=>({...f,desc:e.target.value}))} autoFocus/></div>
                <div className="grid2" style={{marginBottom:12}}>
                  <div><label className="flbl">Amount (£)</label><input className="inp inp-sm" type="number" placeholder="0.00" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))}/></div>
                  <div><label className="flbl">Date</label><input className="inp inp-sm" type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/></div>
                </div>
                <div className="frow"><label className="flbl">Category</label>
                  <select className="inp inp-sm" value={form.catId} onChange={e=>setForm(f=>({...f,catId:e.target.value}))}>
                    {BUD_CATS.map(c=><option key={c.id} value={c.id}>{c.ico} {c.name}</option>)}
                  </select></div>
                <div style={{display:'flex',gap:10}}>
                  <button className="btn btng" onClick={()=>setShowForm(false)} style={{flex:1}}>Cancel</button>
                  <button className="btn" onClick={addTx} style={{flex:1}}>Add</button>
                </div>
              </div>
            )}
            {BUD_CATS.map(cat=>{
              const spent=spentByCat(cat.id);
              const bud=parseFloat(budgets[cat.id])||0;
              const pct=bud>0?Math.min(100,(spent/bud)*100):0;
              const over=bud>0&&spent>bud;
              if(spent===0&&bud===0) return null;
              return(
                <div key={cat.id} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 0',borderBottom:'1px solid var(--glass-border)'}}>
                  <SmallDonut pct={bud>0?pct:0} color={over?'var(--danger)':cat.color} size={48}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:6}}>
                      <span style={{fontSize:'.9rem', fontWeight:600}}>{cat.ico} {cat.name}</span>
                      <span style={{fontSize:'.85rem',fontWeight:700,color:over?'var(--danger)':'var(--text-main)'}}>{fp(spent)}{bud>0&&<span style={{fontWeight:500,color:'var(--text-muted)'}}> / {fp(bud)}</span>}</span>
                    </div>
                    {bud>0&&(<div style={{height:4,background:'rgba(120,120,120,0.15)',borderRadius:99,overflow:'hidden'}}>
                      <div style={{height:'100%',width:pct+'%',background:over?'var(--danger)':pct>75?'var(--warn)':cat.color,borderRadius:99,transition:'width .4s'}}/></div>)}
                  </div>
                </div>
              );
            })}
          </div>
        </>
      )}

      {sub==='monthly'&&(
        <div className="card">
          <div className="ctitle">Monthly Spending — {yr}</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12}}>
            {Array.from({length:12},(_,m)=>{
              const spent=getMonthSpent(m);
              const inc=getMonthIncome(m);
              const pct=inc>0?Math.min(100,(spent/inc)*100):0;
              const isThisMo=m===mo&&yr===now.getFullYear();
              return(
                <div key={m} onClick={()=>{setMo(m);setSub('overview');}}
                  style={{background:isThisMo?'var(--accent-soft)':'rgba(120,120,120,0.1)',borderRadius:12,padding:'12px 10px',
                    textAlign:'center',cursor:'pointer',border:isThisMo?'1px solid var(--accent)':'1px solid var(--glass-border)'}}>
                  <div style={{fontSize:'.75rem',fontWeight:700,color:isThisMo?'var(--accent)':'var(--text-muted)',marginBottom:8,textTransform:'uppercase',letterSpacing:'.05em'}}>{MONTH_NAMES[m]}</div>
                  <div style={{display:'flex',justifyContent:'center',marginBottom:8}}>
                    <SmallDonut pct={pct} color={pct>90?'var(--danger)':pct>75?'var(--warn)':'var(--accent)'} size={54}/>
                  </div>
                  <div style={{fontSize:'.75rem',color:'var(--text-main)', fontWeight:600}}>£{spent.toFixed(0)}</div>
                  {inc>0&&<div style={{fontSize:'.65rem',color:'var(--text-muted)',opacity:.8}}>of £{inc.toFixed(0)}</div>}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {sub==='annual'&&(
        <div className="card" style={{padding:0,overflow:'hidden'}}>
          <div style={{padding:'16px 18px 0',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div className="ctitle" style={{marginBottom:10}}>📊 Annual Budget — {yr}</div>
            <div style={{display:'flex',gap:8,marginBottom:10}}>
              <button className="btn btng btnsm" onClick={()=>setYr(y=>y-1)}>{yr-1}</button>
              <button className="btn btng btnsm" onClick={()=>setYr(y=>y+1)}>{yr+1}</button>
            </div>
          </div>
          <div style={{overflowX:'auto',WebkitOverflowScrolling:'touch'}}>
            <table style={{borderCollapse:'collapse',fontSize:'.75rem',whiteSpace:'nowrap',width:'100%',minWidth:700}}>
              <thead>
                <tr style={{background:'var(--accent)'}}>
                  <th style={{padding:'10px 12px',textAlign:'left',position:'sticky',left:0,background:'var(--accent)',zIndex:2,fontWeight:700,letterSpacing:'.05em',textTransform:'uppercase', color:'#fff'}}>Category</th>
                  {MONTH_NAMES.map(m=><th key={m} style={{padding:'10px 10px',textAlign:'center',fontWeight:700,letterSpacing:'.05em', color:'#fff'}}>{m}</th>)}
                  <th style={{padding:'10px 10px',textAlign:'center',fontWeight:700,letterSpacing:'.05em', color:'#fff'}}>YEAR</th>
                </tr>
              </thead>
              <tbody>
                <tr style={{background:'rgba(50,215,75,.15)'}}>
                  <td colSpan={14} style={{padding:'8px 12px',fontSize:'.7rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--ok)',position:'sticky',left:0,background:'rgba(50,215,75,.15)'}}>REVENUE</td>
                </tr>
                {['salary','other','other2'].map((k,i)=>{
                  const labels=['Salary / Main Income','Other Income','Additional Income'];
                  const yearly=Array.from({length:12},(_,m)=>{ const mk=yr+'-'+String(m+1).padStart(2,'0'); const inc=DB.get('bud_income_'+mk,{salary:'',other:'',other2:''}); return parseFloat(inc[k])||0; });
                  const total=yearly.reduce((s,v)=>s+v,0);
                  if(total===0) return null;
                  return(
                    <tr key={k} style={{background:i%2===0?'rgba(120,120,120,0.05)':'transparent'}}>
                      <td style={{padding:'8px 12px',color:'var(--text-main)',position:'sticky',left:0,background:i%2===0?'var(--bg-color)':'var(--glass-bg)',zIndex:1}}>{labels[i]}</td>
                      {yearly.map((v,m)=><td key={m} style={{padding:'8px 10px',textAlign:'center',color:v>0?'var(--ok)':'var(--text-muted)'}}>{v>0?'£'+v.toFixed(0):'—'}</td>)}
                      <td style={{padding:'8px 10px',textAlign:'center',fontWeight:700,color:'var(--ok)'}}>£{total.toFixed(0)}</td>
                    </tr>
                  );
                })}
                <tr style={{background:'rgba(50,215,75,.10)',borderTop:'1px solid rgba(50,215,75,.3)'}}>
                  <td style={{padding:'10px 12px',fontWeight:700,color:'var(--ok)',position:'sticky',left:0,background:'rgba(50,215,75,.15)'}}>Total Income</td>
                  {Array.from({length:12},(_,m)=>{ const v=getMonthIncome(m); return <td key={m} style={{padding:'10px 10px',textAlign:'center',fontWeight:700,color:'var(--ok)'}}>{v>0?'£'+v.toFixed(0):'—'}</td>; })}
                  <td style={{padding:'10px 10px',textAlign:'center',fontWeight:800,color:'var(--ok)'}}>£{Array.from({length:12},(_,m)=>getMonthIncome(m)).reduce((s,v)=>s+v,0).toFixed(0)}</td>
                </tr>
                <tr style={{background:'rgba(255,69,58,.15)'}}>
                  <td colSpan={14} style={{padding:'8px 12px',fontSize:'.7rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--danger)',position:'sticky',left:0,background:'rgba(255,69,58,.15)'}}>EXPENSES</td>
                </tr>
                {BUD_CATS.map((cat,i)=>{
                  const yearly=Array.from({length:12},(_,m)=>getMonthCatSpent(m,cat.id));
                  const total=yearly.reduce((s,v)=>s+v,0);
                  return(
                    <tr key={cat.id} style={{background:i%2===0?'rgba(120,120,120,0.05)':'transparent'}}>
                      <td style={{padding:'8px 12px',position:'sticky',left:0,background:i%2===0?'var(--bg-color)':'var(--glass-bg)',zIndex:1}}>{cat.ico} {cat.name}</td>
                      {yearly.map((v,m)=><td key={m} style={{padding:'8px 10px',textAlign:'center',color:v>0?'var(--text-main)':'var(--text-muted)'}}>{v>0?'£'+v.toFixed(0):'—'}</td>)}
                      <td style={{padding:'8px 10px',textAlign:'center',fontWeight:700,color:total>0?cat.color:'var(--text-muted)'}}>{total>0?'£'+total.toFixed(0):'—'}</td>
                    </tr>
                  );
                })}
                <tr style={{background:'rgba(255,69,58,.10)',borderTop:'1px solid rgba(255,69,58,.3)'}}>
                  <td style={{padding:'10px 12px',fontWeight:700,color:'var(--danger)',position:'sticky',left:0,background:'rgba(255,69,58,.15)'}}>Total Expenses</td>
                  {Array.from({length:12},(_,m)=>{ const v=getMonthSpent(m); return <td key={m} style={{padding:'10px 10px',textAlign:'center',fontWeight:700,color:'var(--danger)'}}>{v>0?'£'+v.toFixed(0):'—'}</td>; })}
                  <td style={{padding:'10px 10px',textAlign:'center',fontWeight:800,color:'var(--danger)'}}>£{Array.from({length:12},(_,m)=>getMonthSpent(m)).reduce((s,v)=>s+v,0).toFixed(0)}</td>
                </tr>
                <tr style={{background:'rgba(10,132,255,.15)',borderTop:'1px solid rgba(10,132,255,.3)'}}>
                  <td style={{padding:'10px 12px',fontWeight:700,color:'var(--accent)',position:'sticky',left:0,background:'rgba(10,132,255,.15)'}}>💰 Net Savings</td>
                  {Array.from({length:12},(_,m)=>{ const v=getMonthIncome(m)-getMonthSpent(m); return <td key={m} style={{padding:'10px 10px',textAlign:'center',fontWeight:700,color:v>=0?'var(--ok)':'var(--danger)'}}>{getMonthIncome(m)>0?(v>=0?'+':'')+'£'+Math.abs(v).toFixed(0):'—'}</td>; })}
                  <td style={{padding:'10px 10px',textAlign:'center',fontWeight:800,color:'var(--accent)'}}>{(()=>{const v=Array.from({length:12},(_,m)=>getMonthIncome(m)-getMonthSpent(m)).reduce((s,x)=>s+x,0); return (v>=0?'+':'')+'£'+Math.abs(v).toFixed(0);})()}</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      )}

      {sub==='income'&&(
        <div className="card">
          <div className="ctitle">💷 Income — {FULL_MONTHS[mo]}</div>
          {[['salary','Salary / Main Income'],['other','Other Income'],['other2','Additional Income']].map(([k,lbl])=>(
            <div className="frow" key={k}><label className="flbl">{lbl} (£)</label>
              <input className="inp" type="number" placeholder="0.00" value={income[k]} onChange={e=>saveIncome({...income,[k]:e.target.value})}/></div>
          ))}
          <div style={{background:'var(--accent-soft)',borderRadius:12,padding:'14px 16px',display:'flex',justifyContent:'space-between',marginBottom:16,border:'1px solid var(--accent)'}}>
            <span style={{fontSize:'.9rem',color:'var(--text-main)',fontWeight:600}}>Total Income</span>
            <span style={{fontSize:'1.3rem',color:'var(--accent)',fontWeight:700}}>{fp(totalIncome)}</span>
          </div>
          <div className="frow"><label className="flbl">Monthly Saving Goal (£)</label>
            <input className="inp" type="number" placeholder="0.00" value={savingGoal}
              onChange={e=>{setSavingGoal(e.target.value);DB.set('bud_saving_goal',e.target.value);}}/></div>
          <div style={{height:1,background:'var(--glass-border)',margin:'20px 0'}}/>
          <div className="ctitle" style={{marginBottom:14}}>Category Budgets — {FULL_MONTHS[mo]}</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            {BUD_CATS.map(cat=>(
              <div key={cat.id} style={{background:'rgba(120,120,120,0.1)',borderRadius:12,padding:'12px',border:'1px solid var(--glass-border)'}}>
                <div style={{fontSize:'.8rem',fontWeight:600,marginBottom:8,color:'var(--text-main)'}}>{cat.ico} {cat.name}</div>
                <input className="inp inp-sm" type="number" placeholder="£ budget" value={budgets[cat.id]||''}
                  onChange={e=>saveBudgets({...budgets,[cat.id]:e.target.value})} style={{padding:'8px 10px',fontSize:'.85rem'}}/>
              </div>
            ))}
          </div>
        </div>
      )}

      {sub==='transactions'&&(
        <div className="card">
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
            <div className="ctitle" style={{marginBottom:0}}>Transactions — {FULL_MONTHS[mo]}</div>
            <button className="btn btnsm" onClick={()=>{setSub('overview');setShowForm(true);}}>+ Add</button>
          </div>
          <div style={{display:'flex',gap:12,marginBottom:14,fontSize:'.8rem'}}>
            <div style={{flex:1,background:'rgba(50,215,75,.15)',border:'1px solid rgba(50,215,75,.3)',borderRadius:10,padding:'10px',textAlign:'center'}}>
              <div style={{color:'var(--ok)',fontWeight:700, fontSize:'1.1rem'}}>{fp(txs.filter(t=>t.type==='income').reduce((s,t)=>s+(parseFloat(t.amount)||0),0))}</div>
              <div style={{color:'var(--ok)',fontSize:'.65rem',letterSpacing:'.05em',textTransform:'uppercase', opacity:0.8}}>Income</div>
            </div>
            <div style={{flex:1,background:'rgba(255,69,58,.15)',border:'1px solid rgba(255,69,58,.3)',borderRadius:10,padding:'10px',textAlign:'center'}}>
              <div style={{color:'var(--danger)',fontWeight:700, fontSize:'1.1rem'}}>{fp(totalSpent)}</div>
              <div style={{color:'var(--danger)',fontSize:'.65rem',letterSpacing:'.05em',textTransform:'uppercase', opacity:0.8}}>Expenses</div>
            </div>
          </div>
          {txs.length===0&&<div className="empty"><div className="eico">📋</div><div className="etxt">No transactions yet</div></div>}
          {txs.map(t=>{
            const cat=BUD_CATS.find(c=>c.id===t.catId)||BUD_CATS[BUD_CATS.length-1];
            return(
              <div key={t.id} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 0',borderBottom:'1px solid var(--glass-border)'}}>
                <span style={{fontSize:'1.2rem',flexShrink:0}}>{cat.ico}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:'.9rem', fontWeight:500}}>{t.desc}</div>
                  <div style={{fontSize:'.75rem',color:'var(--text-muted)', marginTop:2}}>{cat.name} • {t.date}</div>
                </div>
                <span style={{fontWeight:700,flexShrink:0,color:t.type==='income'?'var(--ok)':'var(--text-main)'}}>{t.type==='income'?'+':'-'}{fp(t.amount)}</span>
                <button onClick={()=>saveTxs(txs.filter(x=>x.id!==t.id))} style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:'1rem',opacity:.5, padding:'0 4px'}}>✕</button>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}


/* ─── App Root ─── */
const TABS=[
  {id:'daily', ico:'✦', lbl:'Today'},
  {id:'goals', ico:'◎', lbl:'Goals'},
  {id:'habits',ico:'☑', lbl:'Habits'},
  {id:'fitness',ico:'♥', lbl:'Fitness'},
  {id:'budget',ico:'£', lbl:'Budget'},
  {id:'bible', ico:'✝', lbl:'Scripture'},
  {id:'affirm',ico:'☀', lbl:'Affirm'},
  {id:'cal',   ico:'◻', lbl:'Calendar'},
  {id:'meet',  ico:'◈', lbl:'Meeting'},
];

function App(){
  const [tab,setTab]=useState('daily');
  const [start,setStart]=useState(undefined);
  const [bgTheme,setBgTheme]=useState(()=>DB.get('bg_theme','apple-dark'));

  useEffect(()=>{
    setStart(DB.get('start', null));
  },[]);

  const onSetup = d => { DB.set('start',d); setStart(d); };
  const setBg = id => { setBgTheme(id); DB.set('bg_theme',id); };

  if(!start) return <Setup onDone={onSetup}/>;

  const dn=calcDay(start),wn=calcWeek(start),mn=calcMonth(start),yn=calcYear(dn);

  return(
    <div className="app" data-theme={bgTheme}>
      <header className="hdr">
        <div className="hdr-t">Journey</div>
        <div className="hdr-r">
          <div className="chips">
            <span className="chip">Day {dn}</span>
            <span className="chip">Wk {wn}</span>
          </div>
        </div>
      </header>

      {/* Theme Switcher */}
      <div className="bg-picker">
        {[
          {id:'apple-dark', label:'Dark Glass'},
          {id:'apple-light', label:'Light Glass'},
          {id:'midnight-glass', label:'Midnight'},
          {id:'ocean-glass', label:'Ocean'},
          {id:'crimson-glass', label:'Crimson'},
        ].map(t=>(
          <div key={t.id} className={`bg-btn${bgTheme===t.id?' active':''}`} onClick={()=>setBg(t.id)}>
            {t.label}
          </div>
        ))}
      </div>

      <main className={`main`}>
        {tab==='daily'   && <DailyTab  dn={dn} wn={wn} mn={mn} yn={yn} />}
        {tab==='goals'   && <GoalsTab  dn={dn} wn={wn} mn={mn} yn={yn} />}
        {tab==='habits'  && <HabitsTab />}
        {tab==='fitness' && <FitnessTab />}
        {tab==='budget'  && <BudgetTab />}
        {tab==='bible'   && <BibleTab  />}
        {tab==='affirm'  && <AffirmTab />}
        {tab==='cal'     && <CalTab    />}
        {tab==='meet'    && <MeetTab   wn={wn} />}
      </main>

      <nav className="bnav">
        {TABS.map(t=>(
          <button key={t.id} className={`nbtn ${tab===t.id?' on':''}`} onClick={()=>setTab(t.id)}>
            <span className="nico">{t.ico}</span>
            <span>{t.lbl}</span>
          </button>))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
